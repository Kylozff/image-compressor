<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeImageCompress - Compress Images Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #f0f1ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8e9ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 10px;
        }

        .upload-formats {
            font-size: 0.9em;
            color: #999;
        }

        #fileInput {
            display: none;
        }

        .controls {
            margin-top: 30px;
        }

        .quality-control {
            margin-bottom: 20px;
        }

        .quality-control label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .quality-value {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }

        .max-size-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .max-size-control input {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 100px;
            font-size: 1em;
        }

        .max-size-control select {
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .compress-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .compress-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .compress-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .download-btn {
            background: #4CAF50;
            color: white;
        }

        .download-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        .reset-btn {
            background: #f44336;
            color: white;
        }

        .reset-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .preview-area {
            margin-top: 30px;
            display: none;
        }

        .preview-area.active {
            display: block;
        }

        .image-preview {
            display: flex;
            gap: 20px;
            align-items: start;
        }

        .preview-box {
            flex: 1;
            text-align: center;
        }

        .preview-box h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .file-info {
            margin-top: 10px;
            color: #666;
            font-size: 0.9em;
        }

        .compression-ratio {
            background: #4CAF50;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9em;
            display: inline-block;
            margin-top: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .image-preview {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗜️ ImageCompress</h1>
        <p class="subtitle">Free Online Image Compression Tool</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop your images here or click to browse</div>
            <div class="upload-formats">Supports: JPEG, PNG, WebP, BMP, GIF, TIFF</div>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </div>

        <div class="controls">
            <div class="quality-control">
                <label>Compression Quality: <span id="qualityLabel">80%</span></label>
                <div class="slider-container">
                    <span>Low</span>
                    <input type="range" id="qualitySlider" min="1" max="100" value="80">
                    <span>High</span>
                    <div class="quality-value" id="qualityValue">80</div>
                </div>
            </div>

            <div class="max-size-control">
                <label>Max File Size (optional):</label>
                <input type="number" id="maxSizeInput" placeholder="e.g., 100" min="1">
                <select id="sizeUnit">
                    <option value="KB">KB</option>
                    <option value="MB">MB</option>
                </select>
            </div>
        </div>

        <div class="button-group">
            <button class="compress-btn" id="compressBtn" disabled>Compress Images</button>
            <button class="download-btn" id="downloadBtn" style="display:none;">Download All</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="preview-area" id="previewArea">
            <div class="image-preview" id="imagePreview"></div>
        </div>
    </div>

    <script>
        class ImageCompressor {
            constructor() {
                this.files = [];
                this.compressedFiles = [];
                this.init();
            }

            init() {
                this.uploadArea = document.getElementById('uploadArea');
                this.fileInput = document.getElementById('fileInput');
                this.compressBtn = document.getElementById('compressBtn');
                this.downloadBtn = document.getElementById('downloadBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.qualitySlider = document.getElementById('qualitySlider');
                this.qualityValue = document.getElementById('qualityValue');
                this.qualityLabel = document.getElementById('qualityLabel');
                this.maxSizeInput = document.getElementById('maxSizeInput');
                this.previewArea = document.getElementById('previewArea');
                this.imagePreview = document.getElementById('imagePreview');
                this.progressBar = document.getElementById('progressBar');
                this.progressFill = document.getElementById('progressFill');

                this.setupEventListeners();
            }

            setupEventListeners() {
                // Upload area click
                this.uploadArea.addEventListener('click', () => this.fileInput.click());
                
                // File input change
                this.fileInput.addEventListener('change', (e) => this.handleFiles(e.target.files));
                
                // Drag and drop
                this.uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    this.uploadArea.classList.add('dragover');
                });
                
                this.uploadArea.addEventListener('dragleave', () => {
                    this.uploadArea.classList.remove('dragover');
                });
                
                this.uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.uploadArea.classList.remove('dragover');
                    this.handleFiles(e.dataTransfer.files);
                });

                // Quality slider
                this.qualitySlider.addEventListener('input', () => {
                    this.qualityValue.textContent = this.qualitySlider.value;
                    this.qualityLabel.textContent = this.qualitySlider.value + '%';
                });

                // Compress button
                this.compressBtn.addEventListener('click', () => this.compressImages());
                
                // Download button
                this.downloadBtn.addEventListener('click', () => this.downloadAll());
                
                // Reset button
                this.resetBtn.addEventListener('click', () => this.reset());
            }

            handleFiles(fileList) {
                this.files = Array.from(fileList).filter(file => file.type.startsWith('image/'));
                
                if (this.files.length === 0) {
                    alert('Please select valid image files.');
                    return;
                }

                this.compressBtn.disabled = false;
                this.compressBtn.textContent = `Compress ${this.files.length} Image${this.files.length > 1 ? 's' : ''}`;
                
                // Show preview of original images
                this.showOriginalPreview();
            }

            showOriginalPreview() {
                this.previewArea.classList.add('active');
                this.imagePreview.innerHTML = '';
                
                this.files.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const previewBox = document.createElement('div');
                        previewBox.className = 'preview-box';
                        previewBox.innerHTML = `
                            <h3>Original ${index + 1}</h3>
                            <img src="${e.target.result}" alt="Original ${index + 1}">
                            <div class="file-info">
                                ${file.name}<br>
                                Size: ${this.formatFileSize(file.size)}
                            </div>
                        `;
                        this.imagePreview.appendChild(previewBox);
                    };
                    reader.readAsDataURL(file);
                });
            }

            async compressImages() {
                if (this.files.length === 0) return;

                this.compressBtn.disabled = true;
                this.compressBtn.textContent = 'Compressing...';
                this.progressBar.classList.add('active');
                this.compressedFiles = [];

                const quality = this.qualitySlider.value / 100;
                const maxSize = this.getMaxSizeInBytes();

                for (let i = 0; i < this.files.length; i++) {
                    try {
                        const compressed = await this.compressImage(this.files[i], quality, maxSize);
                        this.compressedFiles.push(compressed);
                        
                        // Update progress
                        const progress = ((i + 1) / this.files.length) * 100;
                        this.progressFill.style.width = progress + '%';
                    } catch (error) {
                        console.error('Error compressing image:', error);
                        alert(`Error compressing ${this.files[i].name}. Skipping...`);
                    }
                }

                this.showCompressedPreview();
                this.compressBtn.textContent = 'Compression Complete!';
                this.downloadBtn.style.display = 'block';
                this.progressBar.classList.remove('active');
                
                setTimeout(() => {
                    this.compressBtn.disabled = false;
                    this.compressBtn.textContent = `Compress ${this.files.length} Image${this.files.length > 1 ? 's' : ''}`;
                }, 2000);
            }

            async compressImage(file, quality, maxSize) {
                // Create canvas for compression
                const img = await this.loadImage(file);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                // Determine output format
                let outputFormat = 'image/jpeg';
                if (file.type === 'image/png' && this.hasTransparency(img)) {
                    outputFormat = 'image/png';
                } else if (file.type === 'image/webp') {
                    outputFormat = 'image/webp';
                }

                // Try compression with quality adjustment
                let compressedBlob = await this.canvasToBlob(canvas, outputFormat, quality);
                
                // If max size specified, adjust quality to meet target
                if (maxSize && compressedBlob.size > maxSize) {
                    let minQuality = 0.1;
                    let maxQuality = quality;
                    
                    for (let attempt = 0; attempt < 10; attempt++) {
                        const midQuality = (minQuality + maxQuality) / 2;
                        compressedBlob = await this.canvasToBlob(canvas, outputFormat, midQuality);
                        
                        if (compressedBlob.size <= maxSize) {
                            minQuality = midQuality;
                            break;
                        } else {
                            maxQuality = midQuality;
                        }
                    }
                }

                return {
                    blob: compressedBlob,
                    name: this.getOutputFileName(file),
                    originalSize: file.size,
                    compressedSize: compressedBlob.size,
                    format: outputFormat
                };
            }

            loadImage(file) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                    img.src = URL.createObjectURL(file);
                });
            }

            canvasToBlob(canvas, format, quality) {
                return new Promise((resolve) => {
                    canvas.toBlob(resolve, format, quality);
                });
            }

            hasTransparency(img) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                for (let i = 3; i < data.length; i += 4) {
                    if (data[i] < 255) return true;
                }
                return false;
            }

            getOutputFileName(file) {
                const name = file.name.replace(/\.[^/.]+$/, '');
                return `${name}_compressed`;
            }

            getMaxSizeInBytes() {
                const maxSize = parseFloat(this.maxSizeInput.value);
                if (!maxSize) return null;
                
                const unit = document.getElementById('sizeUnit').value;
                return unit === 'MB' ? maxSize * 1024 * 1024 : maxSize * 1024;
            }

            showCompressedPreview() {
                this.imagePreview.innerHTML = '';
                
                this.files.forEach((file, index) => {
                    const compressed = this.compressedFiles[index];
                    if (!compressed) return;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const ratio = ((1 - compressed.compressedSize / compressed.originalSize) * 100).toFixed(1);
                        const previewBox = document.createElement('div');
                        previewBox.className = 'preview-box';
                        previewBox.innerHTML = `
                            <h3>Compressed ${index + 1}</h3>
                            <img src="${e.target.result}" alt="Compressed ${index + 1}">
                            <div class="file-info">
                                Original: ${this.formatFileSize(compressed.originalSize)}<br>
                                Compressed: ${this.formatFileSize(compressed.compressedSize)}
                            </div>
                            <div class="compression-ratio">
                                ${ratio > 0 ? '↓' : '↑'} ${Math.abs(ratio)}% ${ratio > 0 ? 'smaller' : 'larger'}
                            </div>
                        `;
                        this.imagePreview.appendChild(previewBox);
                    };
                    reader.readAsDataURL(compressed.blob);
                });
            }

            async downloadAll() {
                if (this.compressedFiles.length === 0) return;

                if (this.compressedFiles.length === 1) {
                    // Download single file
                    this.downloadFile(this.compressedFiles[0]);
                } else {
                    // Download as ZIP
                    await this.downloadAsZip();
                }
            }

            downloadFile(file) {
                const url = URL.createObjectURL(file.blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${file.name}.${file.format.split('/')[1]}`;
                a.click();
                URL.revokeObjectURL(url);
            }

            async downloadAsZip() {
                // For multiple files, we'll use a simple approach without external libraries
                // Download files one by one with a slight delay
                for (let i = 0; i < this.compressedFiles.length; i++) {
                    setTimeout(() => this.downloadFile(this.compressedFiles[i]), i * 300);
                }
                alert('Downloading files one by one. Please allow multiple downloads in your browser settings.');
            }

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            reset() {
                this.files = [];
                this.compressedFiles = [];
                this.fileInput.value = '';
                this.compressBtn.disabled = true;
                this.compressBtn.textContent = 'Compress Images';
                this.downloadBtn.style.display = 'none';
                this.previewArea.classList.remove('active');
                this.imagePreview.innerHTML = '';
                this.progressBar.classList.remove('active');
                this.progressFill.style.width = '0%';
                this.qualitySlider.value = 80;
                this.qualityValue.textContent = '80';
                this.qualityLabel.textContent = '80%';
                this.maxSizeInput.value = '';
            }
        }

        // Initialize the compressor
        new ImageCompressor();
    </script>
</body>
</html>
