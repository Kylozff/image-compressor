<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Image Compressor Online - Compress JPEG, PNG, WebP</title>
    <meta name="description" content="Free online image compressor. Reduce image size by up to 90%. Compress JPEG, PNG, WebP instantly. No upload required - 100% private.">
    <meta name="keywords" content="image compressor, compress image online, compress jpeg, compress png, reduce image size, free image compression, image size reducer">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://kylozff.github.io/image-compressor/">
    <meta property="og:title" content="Free Image Compressor Online">
    <meta property="og:description" content="Compress images by up to 90% free. No upload needed.">
    <meta name="twitter:card" content="summary_large_image">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px; max-width: 900px; margin: 0 auto;
        }
        h1 { text-align: center; color: #333; font-size: 2em; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        .upload-area {
            border: 3px dashed #667eea; border-radius: 15px;
            padding: 40px; text-align: center; cursor: pointer;
            background: #f8f9ff; margin-bottom: 25px;
        }
        .upload-area:hover { background: #f0f1ff; border-color: #764ba2; }
        .upload-area.dragover { background: #e8e9ff; border-color: #764ba2; }
        .upload-icon { font-size: 48px; margin-bottom: 15px; }
        #fileInput { display: none; }
        .controls { background: #f9f9f9; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .control-row { margin-bottom: 18px; }
        .control-row label { display: block; margin-bottom: 8px; font-weight: 600; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; height: 8px; border-radius: 5px; background: #ddd; cursor: pointer; }
        .quality-badge { background: #667eea; color: white; padding: 6px 14px; border-radius: 20px; font-weight: bold; }
        select, input[type="number"] { padding: 10px; border: 2px solid #ddd; border-radius: 8px; }
        select { width: 100%; max-width: 300px; }
        .size-input-group { display: flex; align-items: center; gap: 8px; }
        .size-input-group input { width: 120px; }
        .button-group { display: flex; gap: 12px; flex-wrap: wrap; }
        button {
            flex: 1; min-width: 120px; padding: 14px 20px;
            border: none; border-radius: 10px; font-weight: 600; cursor: pointer;
        }
        .btn-compress { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-compress:disabled { background: #ccc; cursor: not-allowed; }
        .btn-download { background: #4CAF50; color: white; }
        .btn-reset { background: #f44336; color: white; }
        .result-area { display: none; margin-top: 25px; }
        .result-area.active { display: block; }
        .image-count { background: #667eea; color: white; padding: 6px 16px; border-radius: 20px; display: inline-block; margin-bottom: 15px; }
        .image-card { border: 2px solid #e0e0e0; border-radius: 15px; padding: 20px; margin-bottom: 20px; background: #fafafa; }
        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .detail-item { background: white; border: 2px solid #e0e0e0; border-radius: 10px; padding: 10px; text-align: center; }
        .detail-item .label { font-size: 0.7em; color: #999; text-transform: uppercase; }
        .detail-item .value { font-weight: 700; }
        .comparison-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .compare-box { text-align: center; }
        .compare-box img { max-width: 100%; max-height: 250px; border-radius: 10px; border: 2px solid #e0e0e0; }
        .label-before { background: #ffebee; color: #c62828; padding: 6px 16px; border-radius: 20px; }
        .label-after { background: #e8f5e9; color: #2e7d32; padding: 6px 16px; border-radius: 20px; }
        .compare-info { margin-top: 8px; font-size: 0.85em; color: #666; }
        .reduction-badge { display: inline-block; padding: 5px 12px; border-radius: 15px; font-weight: bold; margin-top: 6px; }
        .reduction-good { background: #e8f5e9; color: #2e7d32; }
        .reduction-medium { background: #fff3e0; color: #e65100; }
        .reduction-bad { background: #ffebee; color: #c62828; }
        .warning-msg { background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
        .warning-msg.show { display: block; }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .comparison-row { grid-template-columns: 1fr; }
            .details-grid { grid-template-columns: 1fr 1fr; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗜️ Free Image Compressor</h1>
        <p class="subtitle">Compress JPEG, PNG, WebP - Reduce Size by 90% - Free & Private</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click to upload or drag & drop images here</div>
            <div class="upload-formats" style="font-size:0.85em;color:#999;">Supports: JPEG, PNG, WebP, BMP, GIF, TIFF</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple>

        <div class="controls">
            <div class="control-row">
                <label>Quality: <strong id="qualityLabel">60% - Medium</strong></label>
                <div class="slider-container">
                    <span>Max</span>
                    <input type="range" id="qualitySlider" min="1" max="100" value="60">
                    <span>Best</span>
                    <span class="quality-badge" id="qualityValue">60%</span>
                </div>
            </div>
            <div class="control-row">
                <label>Format:</label>
                <select id="outputFormat">
                    <option value="auto">Auto (Recommended)</option>
                    <option value="image/webp">WebP (Max Compression)</option>
                    <option value="image/jpeg">JPEG (Photos)</option>
                    <option value="image/png">PNG (Graphics)</option>
                </select>
                <div class="warning-msg" id="formatWarning">⚠️ Converting JPG to PNG will INCREASE file size!</div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-compress" id="compressBtn" disabled>🗜️ Compress Images</button>
            <button class="btn-download" id="downloadBtn" style="display:none;">⬇ Download</button>
            <button class="btn-reset" id="resetBtn">🔄 Reset</button>
        </div>

        <div class="result-area" id="resultArea">
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const compressBtn = document.getElementById('compressBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const qualityLabel = document.getElementById('qualityLabel');
        const outputFormat = document.getElementById('outputFormat');
        const formatWarning = document.getElementById('formatWarning');
        const resultArea = document.getElementById('resultArea');
        const resultsContainer = document.getElementById('resultsContainer');

        let uploadedFiles = [];
        let compressedResults = [];

        uploadArea.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
        });

        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', function() {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        qualitySlider.addEventListener('input', function() {
            var val = qualitySlider.value;
            qualityValue.textContent = val + '%';
            if (val <= 30) qualityLabel.textContent = val + '% - Maximum Compression';
            else if (val <= 60) qualityLabel.textContent = val + '% - Medium';
            else if (val <= 85) qualityLabel.textContent = val + '% - Good Quality';
            else qualityLabel.textContent = val + '% - Best Quality';
        });

        outputFormat.addEventListener('change', function() {
            var hasJPG = uploadedFiles.some(function(f) { return f.type === 'image/jpeg'; });
            if (hasJPG && outputFormat.value === 'image/png') {
                formatWarning.classList.add('show');
            } else if (outputFormat.value === 'image/png') {
                formatWarning.classList.add('show');
                formatWarning.textContent = '⚠️ PNG is lossless. Only use for graphics with transparency.';
            } else {
                formatWarning.classList.remove('show');
            }
        });

        compressBtn.addEventListener('click', compressAllImages);
        downloadBtn.addEventListener('click', downloadAll);
        resetBtn.addEventListener('click', resetAll);

        function handleFiles(fileList) {
            uploadedFiles = Array.from(fileList).filter(function(f) { 
                return f.type.startsWith('image/'); 
            });
            
            if (uploadedFiles.length === 0) {
                alert('Please select valid image files (JPEG, PNG, WebP, etc.)');
                return;
            }

            compressBtn.disabled = false;
            compressBtn.textContent = '🗜️ Compress ' + uploadedFiles.length + ' Image(s)';
            showPreviews();
        }

        function showPreviews() {
            resultArea.classList.add('active');
            var html = '<span class="image-count">📸 ' + uploadedFiles.length + ' Image(s) Ready</span>';
            html += '<h3 style="margin-bottom:15px;color:#666;">Click "Compress Images" to reduce file size</h3>';

            uploadedFiles.forEach(function(file, index) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        var format = file.type.split('/')[1].toUpperCase();
                        var mp = ((img.width * img.height) / 1000000).toFixed(1);
                        
                        var card = document.getElementById('card-' + index);
                        if (card) {
                            card.querySelector('.preview-img').src = e.target.result;
                            card.querySelector('.img-format').textContent = format;
                            card.querySelector('.img-resolution').textContent = img.width + ' × ' + img.height;
                            card.querySelector('.img-megapixels').textContent = mp + ' MP';
                            card.querySelector('.img-filesize').textContent = formatFileSize(file.size);
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);

                html += '<div class="image-card" id="card-' + index + '">';
                html += '<h3>📄 ' + file.name + '</h3>';
                html += '<div class="details-grid">';
                html += '<div class="detail-item"><div class="label">Format</div><div class="value img-format">Loading...</div></div>';
                html += '<div class="detail-item"><div class="label">Resolution</div><div class="value img-resolution">Loading...</div></div>';
                html += '<div class="detail-item"><div class="label">Megapixels</div><div class="value img-megapixels">Loading...</div></div>';
                html += '<div class="detail-item"><div class="label">File Size</div><div class="value img-filesize">Loading...</div></div>';
                html += '</div>';
                html += '<div class="comparison-row">';
                html += '<div class="compare-box"><h4 class="label-before">📷 Original</h4><img class="preview-img" src="" alt="Original" style="background:#eee;min-height:150px;"><div class="compare-info">Waiting...</div></div>';
                html += '<div class="compare-box" id="after-box-' + index + '"><h4 class="label-after">✨ Compressed</h4><div style="padding:40px;color:#999;border:2px dashed #ddd;border-radius:10px;">Click Compress</div></div>';
                html += '</div></div>';
            });

            resultsContainer.innerHTML = html;
        }

        async function compressAllImages() {
            if (uploadedFiles.length === 0) return;

            compressBtn.disabled = true;
            compressBtn.textContent = '⏳ Compressing...';
            compressedResults = [];

            var quality = qualitySlider.value / 100;

            for (var i = 0; i < uploadedFiles.length; i++) {
                var afterBox = document.getElementById('after-box-' + i);
                if (afterBox) {
                    afterBox.innerHTML = '<h4 class="label-after">✨ Compressed</h4><div style="padding:40px;color:#667eea;">⏳ Processing...</div>';
                }

                try {
                    var result = await compressImage(uploadedFiles[i], quality);
                    compressedResults.push(result);
                    updateAfterBox(i, result);
                } catch (err) {
                    console.error('Error:', err);
                }
            }

            compressBtn.textContent = '✅ Done!';
            downloadBtn.style.display = 'block';

            setTimeout(function() {
                compressBtn.disabled = false;
                compressBtn.textContent = '🗜️ Compress Again';
            }, 2000);
        }

        async function compressImage(file, quality) {
            var img = await new Promise(function(resolve, reject) {
                var i = new Image();
                i.onload = function() { resolve(i); };
                i.onerror = reject;
                i.src = URL.createObjectURL(file);
            });

            var format = outputFormat.value;
            if (format === 'auto') {
                var hasTransparency = await checkTransparency(img);
                if (file.type === 'image/png' && hasTransparency) {
                    format = 'image/png';
                } else {
                    format = 'image/webp';
                }
            }

            if (file.type === 'image/jpeg' && format === 'image/png') {
                format = 'image/webp';
            }

            var width = img.width;
            var height = img.height;
            var MAX = 2560;
            if (width > MAX || height > MAX) {
                if (width > height) {
                    height = Math.round((height / width) * MAX);
                    width = MAX;
                } else {
                    width = Math.round((width / height) * MAX);
                    height = MAX;
                }
            }

            var canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            var blob = await new Promise(function(resolve) { 
                canvas.toBlob(resolve, format, quality); 
            });

            if (blob.size >= file.size && quality > 0.1) {
                blob = await new Promise(function(resolve) { 
                    canvas.toBlob(resolve, format, quality * 0.5); 
                });
            }

            if (blob.size >= file.size) {
                return {
                    blob: file,
                    name: file.name,
                    originalSize: file.size,
                    compressedSize: file.size,
                    format: file.type,
                    dimensions: img.width + ' × ' + img.height,
                    noReduction: true
                };
            }

            var ext = format.split('/')[1];
            var baseName = file.name.replace(/\.[^/.]+$/, '');

            return {
                blob: blob,
                name: baseName + '_compressed.' + ext,
                originalSize: file.size,
                compressedSize: blob.size,
                format: format,
                dimensions: width + ' × ' + height,
                noReduction: false
            };
        }

        function updateAfterBox(index, result) {
            var afterBox = document.getElementById('after-box-' + index);
            if (!afterBox) return;

            var reader = new FileReader();
            reader.onload = function(e) {
                var reduction = ((1 - result.compressedSize / result.originalSize) * 100).toFixed(1);
                var badgeClass = 'reduction-good';
                var emoji = '🎉';
                
                if (reduction <= 0) {
                    badgeClass = 'reduction-bad';
                    emoji = '⚠️';
                } else if (reduction < 40) {
                    badgeClass = 'reduction-medium';
                    emoji = '👍';
                }

                var noRedMsg = result.noReduction ? 
                    '<br><span style="color:#c62828;font-weight:bold;">⚠️ Could not reduce further</span>' : '';

                afterBox.innerHTML = '<h4 class="label-after">✨ Compressed</h4>' +
                    '<img src="' + e.target.result + '" alt="Compressed" style="max-width:100%;max-height:250px;border-radius:10px;border:2px solid #e0e0e0;">' +
                    '<div class="compare-info">' +
                    result.dimensions + '<br>' +
                    formatFileSize(result.compressedSize) + '<br>' +
                    'Format: ' + result.format.split('/')[1].toUpperCase() +
                    noRedMsg +
                    '<br><span class="reduction-badge ' + badgeClass + '">' +
                    emoji + ' ' + (reduction > 0 ? '↓' : '↑') + ' ' + Math.abs(reduction) + '% ' + (reduction > 0 ? 'Smaller' : '') +
                    '</span></div>';
            };
            reader.readAsDataURL(result.blob);
        }

        function checkTransparency(img) {
            var canvas = document.createElement('canvas');
            canvas.width = Math.min(img.width, 100);
            canvas.height = Math.min(img.height, 100);
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            var data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (var i = 3; i < data.length; i += 4) {
                if (data[i] < 255) return true;
            }
            return false;
        }

        function downloadAll() {
            if (compressedResults.length === 0) return;
            compressedResults.forEach(function(result, i) {
                setTimeout(function() {
                    var url = URL.createObjectURL(result.blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = result.name;
                    a.click();
                    URL.revokeObjectURL(url);
                }, i * 300);
            });
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            var sizes = ['Bytes', 'KB', 'MB', 'GB'];
            var i = Math.floor(Math.log(bytes) / Math.log(1024));
            return parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function resetAll() {
            uploadedFiles = [];
            compressedResults = [];
            fileInput.value = '';
            compressBtn.disabled = true;
            compressBtn.textContent = '🗜️ Compress Images';
            downloadBtn.style.display = 'none';
            resultArea.classList.remove('active');
            resultsContainer.innerHTML = '';
            qualitySlider.value = 60;
            qualityValue.textContent = '60%';
            qualityLabel.textContent = '60% - Medium';
            outputFormat.value = 'auto';
            formatWarning.classList.remove('show');
        }
    </script>
</body>
</html>
