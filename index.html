<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageCompress Pro - Free Online Image Compression</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 25px;
        }

        .upload-area:hover {
            background: #f0f1ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8e9ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 8px;
        }

        .upload-formats {
            font-size: 0.85em;
            color: #999;
        }

        #fileInput {
            display: none;
        }

        .controls {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .control-row {
            margin-bottom: 18px;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        .control-row label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9em;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .quality-badge {
            background: #667eea;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            min-width: 55px;
            text-align: center;
        }

        select, input[type="number"] {
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.95em;
            background: white;
        }

        select {
            width: 100%;
            max-width: 300px;
        }

        .size-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .size-input-group input {
            width: 120px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-compress {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-compress:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-compress:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
        }

        .btn-reset {
            background: #f44336;
            color: white;
        }

        .btn-reset:hover {
            background: #da190b;
        }

        .warning-msg {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85em;
            margin-top: 10px;
            display: none;
        }

        .warning-msg.show {
            display: block;
        }

        .result-area {
            display: none;
            margin-top: 25px;
        }

        .result-area.active {
            display: block;
        }

        .image-count {
            background: #667eea;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            display: inline-block;
            margin-bottom: 15px;
        }

        .image-card {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .image-card h3 {
            color: #333;
            margin-bottom: 15px;
            word-break: break-all;
            font-size: 1em;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .detail-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .detail-item .label {
            font-size: 0.7em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .detail-item .value {
            font-size: 1em;
            font-weight: 700;
            color: #333;
        }

        .detail-item.format-jpeg { border-left: 4px solid #FF9800; }
        .detail-item.format-png { border-left: 4px solid #4CAF50; }
        .detail-item.format-webp { border-left: 4px solid #2196F3; }
        .detail-item.format-gif { border-left: 4px solid #9C27B0; }

        .comparison-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .compare-box {
            text-align: center;
        }

        .compare-box h4 {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            font-size: 0.85em;
        }

        .label-before {
            background: #ffebee;
            color: #c62828;
        }

        .label-after {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .compare-box img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .compare-info {
            margin-top: 8px;
            font-size: 0.85em;
            color: #666;
            line-height: 1.5;
        }

        .reduction-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.85em;
            margin-top: 6px;
        }

        .reduction-good {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .reduction-medium {
            background: #fff3e0;
            color: #e65100;
        }

        .reduction-bad {
            background: #ffebee;
            color: #c62828;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .comparison-row { grid-template-columns: 1fr; }
            .details-grid { grid-template-columns: 1fr 1fr; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗜️ ImageCompress Pro</h1>
        <p class="subtitle">Free Online Image Compression - See Details, Compare & Download</p>

        <!-- Upload Area -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click to upload or drag & drop images here</div>
            <div class="upload-formats">Supports: JPEG, PNG, WebP, BMP, GIF, TIFF</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple>

        <!-- Controls -->
        <div class="controls">
            <div class="control-row">
                <label>Compression Quality: <strong id="qualityLabel">60% - Medium</strong></label>
                <div class="slider-container">
                    <span style="font-size:0.85em;">Max Compress</span>
                    <input type="range" id="qualitySlider" min="1" max="100" value="60">
                    <span style="font-size:0.85em;">Best Quality</span>
                    <span class="quality-badge" id="qualityValue">60%</span>
                </div>
            </div>

            <div class="control-row">
                <label>Output Format:</label>
                <select id="outputFormat">
                    <option value="auto">Auto (Smart Choice - Recommended)</option>
                    <option value="image/webp">WebP (Maximum Compression)</option>
                    <option value="image/jpeg">JPEG (Best for Photos)</option>
                    <option value="image/png">PNG (Graphics with Transparency)</option>
                </select>
                <div class="warning-msg" id="formatWarning">
                    ⚠️ Converting JPG to PNG will INCREASE file size! Use WebP or JPEG instead.
                </div>
            </div>

            <div class="control-row">
                <label>Target Max File Size (optional):</label>
                <div class="size-input-group">
                    <input type="number" id="maxSizeInput" placeholder="e.g., 500" min="1">
                    <select id="sizeUnit">
                        <option value="KB">KB</option>
                        <option value="MB">MB</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <button class="btn-compress" id="compressBtn" disabled>🗜️ Compress Images</button>
            <button class="btn-download" id="downloadBtn" style="display:none;">⬇ Download</button>
            <button class="btn-reset" id="resetBtn">🔄 Reset</button>
        </div>

        <!-- Progress -->
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Results -->
        <div class="result-area" id="resultArea">
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        // Main App
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const compressBtn = document.getElementById('compressBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const qualityLabel = document.getElementById('qualityLabel');
        const outputFormat = document.getElementById('outputFormat');
        const formatWarning = document.getElementById('formatWarning');
        const maxSizeInput = document.getElementById('maxSizeInput');
        const resultArea = document.getElementById('resultArea');
        const resultsContainer = document.getElementById('resultsContainer');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        let uploadedFiles = [];
        let compressedResults = [];

        // Upload Area Click
        uploadArea.addEventListener('click', () => fileInput.click());

        // File Input Change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
        });

        // Drag & Drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        // Quality Slider
        qualitySlider.addEventListener('input', () => {
            const val = qualitySlider.value;
            qualityValue.textContent = val + '%';
            if (val <= 30) qualityLabel.textContent = val + '% - Maximum Compression';
            else if (val <= 60) qualityLabel.textContent = val + '% - Medium';
            else if (val <= 85) qualityLabel.textContent = val + '% - Good Quality';
            else qualityLabel.textContent = val + '% - Best Quality';
        });

        // Format Warning
        outputFormat.addEventListener('change', () => {
            const hasJPG = uploadedFiles.some(f => f.type === 'image/jpeg');
            if (hasJPG && outputFormat.value === 'image/png') {
                formatWarning.classList.add('show');
            } else if (outputFormat.value === 'image/png') {
                formatWarning.classList.add('show');
                formatWarning.textContent = '⚠️ PNG is lossless. Only use for graphics with transparency.';
            } else {
                formatWarning.classList.remove('show');
            }
        });

        // Compress Button
        compressBtn.addEventListener('click', compressAllImages);

        // Download Button
        downloadBtn.addEventListener('click', downloadAll);

        // Reset Button
        resetBtn.addEventListener('click', resetAll);

        // Handle Files
        function handleFiles(fileList) {
            uploadedFiles = Array.from(fileList).filter(f => f.type.startsWith('image/'));
            
            if (uploadedFiles.length === 0) {
                alert('Please select valid image files (JPEG, PNG, WebP, etc.)');
                return;
            }

            compressBtn.disabled = false;
            compressBtn.textContent = `🗜️ Compress ${uploadedFiles.length} Image(s)`;
            showPreviews();
        }

        // Show Previews
        function showPreviews() {
            resultArea.classList.add('active');
            let html = `<span class="image-count">📸 ${uploadedFiles.length} Image(s) Ready</span>`;
            html += '<h3 style="margin-bottom:15px;color:#666;">Click "Compress Images" to reduce file size</h3>';

            uploadedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const format = file.type.split('/')[1].toUpperCase();
                        const mp = ((img.width * img.height) / 1000000).toFixed(1);
                        
                        const card = document.getElementById(`card-${index}`);
                        if (card) {
                            card.querySelector('.preview-img').src = e.target.result;
                            card.querySelector('.img-format').textContent = format;
                            card.querySelector('.img-resolution').textContent = img.width + ' × ' + img.height;
                            card.querySelector('.img-megapixels').textContent = mp + ' MP';
                            card.querySelector('.img-filesize').textContent = formatFileSize(file.size);
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);

                html += `
                    <div class="image-card" id="card-${index}">
                        <h3>📄 ${file.name}</h3>
                        <div class="details-grid">
                            <div class="detail-item format-${file.type.split('/')[1]}">
                                <div class="label">Format</div>
                                <div class="value img-format">Loading...</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Resolution</div>
                                <div class="value img-resolution">Loading...</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Megapixels</div>
                                <div class="value img-megapixels">Loading...</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">File Size</div>
                                <div class="value img-filesize">Loading...</div>
                            </div>
                        </div>
                        <div class="comparison-row">
                            <div class="compare-box">
                                <h4 class="label-before">📷 Original</h4>
                                <img class="preview-img" src="" alt="Original" style="background:#eee;min-height:150px;">
                                <div class="compare-info">Waiting for compression...</div>
                            </div>
                            <div class="compare-box" id="after-box-${index}">
                                <h4 class="label-after">✨ Compressed</h4>
                                <div style="padding:40px;color:#999;border:2px dashed #ddd;border-radius:10px;font-size:0.9em;">
                                    Click "Compress Images"
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            resultsContainer.innerHTML = html;
        }

        // Compress All Images
        async function compressAllImages() {
            if (uploadedFiles.length === 0) return;

            compressBtn.disabled = true;
            compressBtn.textContent = '⏳ Compressing...';
            progressBar.classList.add('active');
            compressedResults = [];

            const quality = qualitySlider.value / 100;
            const maxSize = getMaxSizeBytes();

            for (let i = 0; i < uploadedFiles.length; i++) {
                // Update status
                const afterBox = document.getElementById(`after-box-${i}`);
                if (afterBox) {
                    afterBox.innerHTML = `
                        <h4 class="label-after">✨ Compressed</h4>
                        <div style="padding:40px;color:#667eea;font-size:0.9em;">⏳ Processing...</div>
                    `;
                }

                try {
                    const result = await compressImage(uploadedFiles[i], quality, maxSize);
                    compressedResults.push(result);
                    updateAfterBox(i, result);
                } catch (err) {
                    console.error('Error:', err);
                }

                progressFill.style.width = ((i + 1) / uploadedFiles.length * 100) + '%';
            }

            compressBtn.textContent = '✅ Done!';
            downloadBtn.style.display = 'block';
            progressBar.classList.remove('active');
            progressFill.style.width = '0%';

            setTimeout(() => {
                compressBtn.disabled = false;
                compressBtn.textContent = '🗜️ Compress Again';
            }, 2000);
        }

        // Compress Single Image
        async function compressImage(file, quality, maxSize) {
            // Load image
            const img = await new Promise((resolve, reject) => {
                const i = new Image();
                i.onload = () => resolve(i);
                i.onerror = reject;
                i.src = URL.createObjectURL(file);
            });

            // Determine format
            let format = outputFormat.value;
            if (format === 'auto') {
                const hasTransparency = await checkTransparency(img);
                if (file.type === 'image/png' && hasTransparency) {
                    format = 'image/png';
                } else {
                    format = 'image/webp';
                }
            }

            // Prevent JPEG → PNG
            if (file.type === 'image/jpeg' && format === 'image/png') {
                format = 'image/webp';
            }

            // Resize if needed
            let width = img.width;
            let height = img.height;
            const MAX = 2560;
            if (width > MAX || height > MAX) {
                if (width > height) {
                    height = Math.round((height / width) * MAX);
                    width = MAX;
                } else {
                    width = Math.round((width / height) * MAX);
                    height = MAX;
                }
            }

            // Draw to canvas
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // Compress
            let blob = await new Promise(resolve => canvas.toBlob(resolve, format, quality));

            // If larger than original, try harder
            if (blob.size >= file.size && quality > 0.1) {
                blob = await new Promise(resolve => canvas.toBlob(resolve, format, quality * 0.5));
            }

            // Target size
            if (maxSize && blob.size > maxSize) {
                for (let q = 0.9; q >= 0.05; q -= 0.1) {
                    blob = await new Promise(resolve => canvas.toBlob(resolve, format, q));
                    if (blob.size <= maxSize) break;
                }
            }

            // If still larger, return original
            if (blob.size >= file.size) {
                return {
                    blob: file,
                    name: file.name,
                    originalSize: file.size,
                    compressedSize: file.size,
                    format: file.type,
                    dimensions: img.width + ' × ' + img.height,
                    noReduction: true
                };
            }

            // Generate filename
            const ext = format.split('/')[1];
            const baseName = file.name.replace(/\.[^/.]+$/, '');

            return {
                blob: blob,
                name: baseName + '_compressed.' + ext,
                originalSize: file.size,
                compressedSize: blob.size,
                format: format,
                dimensions: width + ' × ' + height,
                noReduction: false
            };
        }

        // Update After Box
        function updateAfterBox(index, result) {
            const afterBox = document.getElementById(`after-box-${index}`);
            if (!afterBox) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const reduction = ((1 - result.compressedSize / result.originalSize) * 100).toFixed(1);
                let badgeClass = 'reduction-good';
                let emoji = '🎉';
                
                if (reduction <= 0) {
                    badgeClass = 'reduction-bad';
                    emoji = '⚠️';
                } else if (reduction < 40) {
                    badgeClass = 'reduction-medium';
                    emoji = '👍';
                }

                const noRedMsg = result.noReduction ? 
                    '<br><span style="color:#c62828;font-weight:bold;">⚠️ Could not reduce further</span>' : '';

                afterBox.innerHTML = `
                    <h4 class="label-after">✨ Compressed</h4>
                    <img src="${e.target.result}" alt="Compressed" style="max-width:100%;max-height:250px;border-radius:10px;border:2px solid #e0e0e0;">
                    <div class="compare-info">
                        ${result.dimensions}<br>
                        ${formatFileSize(result.compressedSize)}<br>
                        Format: ${result.format.split('/')[1].toUpperCase()}
                        ${noRedMsg}
                        <br>
                        <span class="reduction-badge ${badgeClass}">
                            ${emoji} ${reduction > 0 ? '↓' : '↑'} ${Math.abs(reduction)}% ${reduction > 0 ? 'Smaller' : ''}
                        </span>
                    </div>
                `;
            };
            reader.readAsDataURL(result.blob);
        }

        // Check Transparency
        function checkTransparency(img) {
            const canvas = document.createElement('canvas');
            canvas.width = Math.min(img.width, 100);
            canvas.height = Math.min(img.height, 100);
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 3; i < data.length; i += 4) {
                if (data[i] < 255) return true;
            }
            return false;
        }

        // Get Max Size in Bytes
        function getMaxSizeBytes() {
            const val = parseFloat(maxSizeInput.value);
            if (!val) return null;
            const unit = document.getElementById('sizeUnit').value;
            return unit === 'MB' ? val * 1048576 : val * 1024;
        }

        // Download All
        function downloadAll() {
            if (compressedResults.length === 0) return;
            compressedResults.forEach((result, i) => {
                setTimeout(() => {
                    const url = URL.createObjectURL(result.blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = result.name;
                    a.click();
                    URL.revokeObjectURL(url);
                }, i * 300);
            });
        }

        // Format File Size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Reset
        function resetAll() {
            uploadedFiles = [];
            compressedResults = [];
            fileInput.value = '';
            compressBtn.disabled = true;
            compressBtn.textContent = '🗜️ Compress Images';
            downloadBtn.style.display = 'none';
            resultArea.classList.remove('active');
            resultsContainer.innerHTML = '';
            qualitySlider.value = 60;
            qualityValue.textContent = '60%';
            qualityLabel.textContent = '60% - Medium';
            maxSizeInput.value = '';
            outputFormat.value = 'auto';
            formatWarning.classList.remove('show');
        }
    </script>
</body>
